{# Widget: USD/CNY 汇率 #}
{% set d = widget.data %}
<div class="widget-fx">
  {% if d.rate %}
  <strong class="widget-big-number">{{ "{:.4f}".format(d.rate) }}</strong>
  <span class="text-soft" style="font-size:12px;">{{ d.date|default('') }}</span>
  {% else %}
  <span class="text-soft">暂无汇率数据</span>
  {% endif %}
</div>
