{# Widget: 资产变化趋势 — line chart rendered by Chart.js #}
<div class="trend-range-bar">
  <button class="range-btn active" data-range="30">1月</button>
  <button class="range-btn" data-range="90">3月</button>
  <button class="range-btn" data-range="365">1年</button>
  <button class="range-btn" data-range="ytd">今年</button>
  <button class="range-btn" data-range="all">全部</button>
</div>
<div class="widget-trend">
  <canvas id="chart-trend" height="220"></canvas>
</div>
