<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title if title else 'Media Hub' }}</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>html { scroll-behavior: smooth; }</style>
</head>
<body>
  <button class="back-to-top" id="backToTop" title="回到顶部">↑</button>
  <header class="topbar">
    <div class="brand">🎬 Media Hub</div>
    <nav>
      <a href="/">首页</a>
      <a href="/library">影视库</a>
      <a href="/recommendations">推荐</a>
    </nav>
  </header>
  <main class="container">{% block content %}{% endblock %}</main>
  {% if site_stats %}
  <footer class="site-footer">
    <div class="footer-stats">
      <div class="footer-stat"><span>影视库</span><strong>{{ site_stats.total }}</strong>部</div>
      <div class="footer-stat"><span>已看</span><strong>{{ site_stats.watched }}</strong>部</div>
      <div class="footer-stat"><span>想看</span><strong>{{ site_stats.wish }}</strong>部</div>
      {% if site_stats.avg_rating %}<div class="footer-stat"><span>均分</span><strong>{{ site_stats.avg_rating }}</strong></div>{% endif %}
    </div>
    <span class="footer-brand">🎬 Media Hub</span>
  </footer>
  {% endif %}
<script>
(function() {
  var btn = document.getElementById('backToTop');
  if (btn) {
    window.addEventListener('scroll', function() {
      btn.style.opacity = window.scrollY > 400 ? '1' : '0';
      btn.style.pointerEvents = window.scrollY > 400 ? 'auto' : 'none';
    });
    btn.addEventListener('click', function() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }
})();
</script>
</body>
</html>
